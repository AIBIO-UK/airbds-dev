# Review template — AIRBDS AI-Readiness Dataset Scoring Metric v0.4
# Fill in all fields. For each question, set answer to "Yes" or "No".
# This YAML lists answer slots by question id; see airbds_metric_v0.4.yaml (or
# review_template.csv) for the full question text and guidance.
# See reviews/GUIDANCE.md and the metric YAML's grading block for grading details.
#
# Scoring is NOT automated: automated scoring on pull request is disabled. Score
# the completed file yourself with:
#   python3 reviews/src/scripts/review_processor.py --files <file-list>
# This validates the review, fills in the result block, and renames the file.
# To submit, open a PR at https://github.com/AIBIO-UK/airbds-dev

schema_version: "0.4"

reviewer:
  name: ""            # Full name
  initials: ""        # e.g. GF
  orcid: ""           # e.g. 0000-0000-0000-0000
  affiliation: ""
  review_date: ""     # ISO 8601, e.g. 2025-01-15

dataset:
  name: ""
  url: ""
  hosting_resource: ""
  accession: ""
  comments: ""

process_comments: ""

answers:
  ABC-01: { answer: "", comments: "" }
  ABC-02: { answer: "", comments: "" }
  ABC-03: { answer: "", comments: "" }
  ABC-04: { answer: "", comments: "" }
  ABC-05: { answer: "", comments: "" }
  ABC-06: { answer: "", comments: "" }
  ABC-07: { answer: "", comments: "" }
  ABC-08: { answer: "", comments: "" }
  ABC-09: { answer: "", comments: "" }
  ABC-10: { answer: "", comments: "" }
  ABC-11: { answer: "", comments: "" }
  ABC-12: { answer: "", comments: "" }
  ABC-13: { answer: "", comments: "" }
  ABC-14: { answer: "", comments: "" }
  ABC-15: { answer: "", comments: "" }
  ABC-16: { answer: "", comments: "" }
  ABC-17: { answer: "", comments: "" }
  ABC-18: { answer: "", comments: "" }
  ABC-19: { answer: "", comments: "" }
  ABC-20: { answer: "", comments: "" }
  ABC-21: { answer: "", comments: "" }
  ABC-22: { answer: "", comments: "" }
  ABC-23: { answer: "", comments: "" }
  # Ethics questions — answer "Yes" if dataset has no human/animal subjects
  ABC-24: { answer: "", comments: "", not_applicable: false }
  ABC-25: { answer: "", comments: "", not_applicable: false }
  ABC-26: { answer: "", comments: "", not_applicable: false }
  ABC-27: { answer: "", comments: "", not_applicable: false }

# Calculated fields — complete after scoring
result:
