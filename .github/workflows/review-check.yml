name: Review Check & Score (disabled)

# DISABLED — the manual review process is not live, so this workflow no longer
# runs automatically. The push/pull_request triggers on 'reviews/testing/**' were
# removed: a green check here implied reviews were being validated and scored as
# part of a working pipeline, which is not the case.
#
# It is retained, not deleted, so the process can be revived: restore the triggers
# below to bring it back. Commit-back is also inert while dormant — the step is
# gated on a `push` event, which can no longer occur.
#
#   on:
#     push:
#       paths:
#         - 'reviews/testing/**'
#     pull_request:
#       paths:
#         - 'reviews/testing/**'
#
# Manual dispatch still validates and scores changed review files (without
# committing anything back). To score a review locally instead:
#   python3 reviews/src/scripts/review_processor.py --files <your-review-file>
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Find changed review files
        id: changed
        run: |
          # Determine comparison base:
          # - PR: compare against base branch SHA
          # - Push: use event.before SHA (pre-push state); fall back to HEAD~1 if zero SHA
          # - Manual dispatch: no event.before exists, so compare against HEAD~1
          BEFORE="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          else
            BASE="$BEFORE"
          fi

          echo "Comparing against base: $BASE"

          git diff --name-only --diff-filter=AM "$BASE" HEAD -- 'reviews/testing/**' \
            | grep -E '\.(yaml|csv)$' \
            > /tmp/changed_reviews.txt || true

          COUNT=$(wc -l < /tmp/changed_reviews.txt | tr -d ' ')
          echo "changed_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT changed review file(s):"
          cat /tmp/changed_reviews.txt

      - name: Process review files
        if: steps.changed.outputs.changed_count != '0'
        id: process
        run: |
          python3 reviews/src/scripts/review_processor.py --files /tmp/changed_reviews.txt
        continue-on-error: true
        # continue-on-error allows the commit step to run for partially valid batches

      - name: Commit scored and converted files
        # Skip commit-back on fork PRs (GITHUB_TOKEN cannot push to forks)
        if: >
          steps.process.outputs.has_changes == 'true' &&
          (github.event_name == 'push' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews/testing/
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git commit -m "chore: auto-score reviews [skip ci]"
              git push origin HEAD:"${{ github.head_ref }}"
            else
              git commit -m "chore: auto-score reviews [skip ci]"
              git push
            fi
          fi

      - name: Fork PR notice
        if: >
          steps.process.outputs.has_changes == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "## Fork PR — manual step required" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This PR comes from a fork. The automated commit-back step is skipped because" >> "$GITHUB_STEP_SUMMARY"
          echo "GITHUB_TOKEN cannot push to forked repositories." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To apply the scored filenames locally, run:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "pip install pyyaml" >> "$GITHUB_STEP_SUMMARY"
          echo "python3 reviews/src/scripts/review_processor.py --files <your-review-file>" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if validation errors
        if: steps.process.outputs.has_errors == 'true'
        run: |
          echo "One or more review files failed validation. See the summary above for details."
          exit 1
