name: Build Assessment Skill for Test

# Trigger the workflow when changes are pushed to the main branch
on:
  push:
    branches:
      - main
      - skills-testing
    paths:
      - 'skills/testing/airbds-assessment-skill/SKILL.md'
      - 'skills/testing/airbds-assessment-skill/templates/*'
  workflow_dispatch:

jobs:
  latest-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP file
        run: |
          # Zip from inside the skill directory so its structure (including
          # templates/) is preserved with the skill dir as the zip root. No -y,
          # so the symlinked metric template is dereferenced into a real file.
          ( cd skills/testing/airbds-assessment-skill && zip -r - . ) > airbds-assessment-skill.zip
        
      - name: Update Test Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: assessment-skill-testing
          name: "AIRBDS assessment testing skill zip"
          draft: false
          prerelease: true
          files: airbds-assessment-skill.zip
