schema_version: "0.3"
document: "Scoring Schema and Reviewer Instructions"

answers:
  - value: "Yes"
    numeric: 1
  - value: "No"
    numeric: 0

weights:
  - tier: "Critical"
    points: 80
    rationale: >
      Failing a Critical question indicates a fundamental problem that severely
      limits the dataset's suitability for AI/ML use.
  - tier: "Important"
    points: 5
    rationale: >
      Important questions represent best practices affecting reproducibility,
      interoperability, or usability.
  - tier: "Optional"
    points: 2
    rationale: >
      Optional questions capture desirable but non-essential characteristics.

grades:
  - grade: "Caution"
    badge_color: "#dc3545"
    description: "May have serious issues. Fails one or more critical criteria."
    criteria:
      critical_pass_rate: "< 7/8"
  - grade: "Bronze"
    badge_color: "#cd7f32"
    description: "Passes most Critical questions."
    criteria:
      critical_pass_rate: ">= 7/8"
  - grade: "Silver"
    badge_color: "#c0c0c0"
    description: "Passes all Critical plus >= 50% of Important questions."
    criteria:
      critical_pass_rate: "1.0"
      important_pass_rate: ">= 0.5"
  - grade: "Gold"
    badge_color: "#ffc107"
    description: "Passes all Critical and Important, plus >= 50% Optional."
    criteria:
      critical_pass_rate: "1.0"
      important_pass_rate: "1.0"
      optional_pass_rate: ">= 0.5"

ethics_note: >
  Ethics questions (ACM-24 to ACM-28) default to "Yes" for datasets containing
  no human or animal subject data. Note this in the comments field.

versioning:
  policy: "Semantic Versioning (MAJOR.MINOR.PATCH)"
  breaking_change: "MINOR increment for question additions/deletions/rewordings"
  clarification_only: "PATCH increment for guidance-only changes"
  scoring_change: "MAJOR increment for weight or threshold changes"
  current_version: "0.3"
  changelog: "See CHANGELOG.md"
